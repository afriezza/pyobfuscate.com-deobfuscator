name: Auto Python Deobfuscator

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deobfuscate-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Menggunakan Python 3.10 sebagai basis standar

    # Install library untuk decompile bytecode marshal jika berhasil diekstrak
    - name: Install Decompiler Tools
      run: |
        pip install uncompyle6 xdis

    - name: Run Advanced Deobfuscator
      run: |
        cat << 'EOF' > run_deobf.py
        import ast
        import os
        import marshal
        import dis
        import sys

        target_file = "shoxa_gen_fix.py"
        output_file = "deobf_clean.py"

        if not os.path.exists(target_file):
            print(f"Error: File {target_file} tidak ditemukan!")
            exit(1)

        print(f"Versi Python Runner: {sys.version}")
        
        with open(target_file, 'r', encoding='utf-8') as f:
            source = f.read()

        try:
            # Langkah alternatif: Coba bersihkan kode dari fungsi pembungkus (exec/eval)
            # dan ambil string biner penyusunnya secara paksa tanpa mengeksekusi marshal langsung
            print("Menganalisis string biner obfuscated...")
            
            # Kita cari pola regex manual atau bypass via modifikasi string
             modified_source = source.replace('marshal.loads', 'print')
            
            # Kita tulis ulang skrip agar dia mencetak isi objek marshal-nya saja ke file log
            with open("dump_bytes.txt", "w") as d:
                d.write(source)
                
            print("Mencoba ekstraksi struktur kode biner...")
            # Jika crash di marshal, kita paksa bypass dengan membaca bytecode via disassembler
            # Kita simpan source asli apa adanya untuk diperiksa manual strukturnya
            with open(output_file, 'w', encoding='utf-8') as out:
                out.write("# Gagal bypass otomatis karena perbedaan versi marshal.\n")
                out.write("# Berikut isi kode mentah pembungkus yang terbaca:\n\n")
                out.write(source)
                
            print("Log mentah berhasil disimpan ke deobf_clean.py.")
            
        except Exception as e:
            print(f"Gagal total pada pemrosesan: {e}")
            exit(1)
        EOF
        
        python run_deobf.py

    - name: Upload Clean Code Artifact
      uses: actions/upload-artifact@v4
      with:
        name: clean-python-code
        path: deobf_clean.py
