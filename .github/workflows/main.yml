name: Jalankan Script Otomatis

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Jalankan Python
        run: python dumped_correct_code.py

      # --- INI TAMBAHANNYA BIAR FILENYA KELUAR ---
      - name: Upload Hasil Dump
        uses: actions/upload-artifact@v4
        with:
          name: hasil-deobfuscate
          path: |
            dumped_correct_code.pyc
            raw_extracted_data.bin
          if-no-files-found: warn
